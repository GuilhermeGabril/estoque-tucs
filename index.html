<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cadastro de Estoque</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Cadastro de Estoque - Tucanus</h1>

<form id="form">
  <input type="text" id="nome" placeholder="Nome do produto" required>
  <input type="number" id="qtd" placeholder="Quantidade" min="0" required>
  <input type="text" id="categoria" placeholder="Categoria" required>
  <input type="text" id="link" placeholder="Link do produto">

  <button type="submit">Salvar</button>
</form>

<a href="visualizar.html">Ver Estoque</a>

<script src="script.js"></script>
</body>
</html>
