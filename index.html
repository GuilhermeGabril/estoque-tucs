<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tucanus - Controle de Estoque</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
 <div class="container">
    <div class="logo-section">
      <div class="logo-tucanus">
        <div class="logo-placeholder" id="logoContainer">
          <img src="logo-tucanos.jpg" alt="Logo Tucanus" style="width: 100%; height: 100%; object-fit: contain;">
    </div>

    <div class="header">
      <h1>Tucanus<span>Estoque</span></h1>
      <p class="subtitle">Para registrar qualquer objeto da sala basta preencher e clicar em salvar!</p>
    </div>

    <div class="form-card">
      <div class="card-header">
        <h2>Novo Produto</h2>
        <span class="badge">Cadastro</span>
      </div>
      
      <form id="form">
        <div class="form-group">
          <label for="nome">Nome do produto</label>
          <input type="text" id="nome" placeholder="Ex: Limelight 4" required>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="qtd">Quantidade</label>
            <input type="number" id="qtd" placeholder="0" min="0" required>
          </div>

          <div class="form-group">
            <label for="categoria">Categoria</label>
            <input type="text" id="categoria" placeholder="Ex: Câmera" required>
          </div>
        </div>

        <div class="form-group">
          <label for="link">Link do produto</label>
          <input type="text" id="link" placeholder="https://...">
        </div>

        <button type="submit" class="btn-primary">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
            <path d="M10 4v12M4 10h12"/>
          </svg>
          Salvar Produto
        </button>
      </form>
    </div>
<div class="action-footer">
      <a href="https://docs.google.com/spreadsheets/d/19ko-bmKcGcP8SLIFAAp2MFy9jRoC3CdLgqTK_3Z1s9c/edit?usp=sharing" target="_blank" class="btn-secondary" rel="noopener noreferrer">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="9" cy="9" r="3"/>
          <path d="M1 9s3-6 8-6 8 6 8 6-3 6-8 6-8-6-8-6z"/>
        </svg>
        Visualizar Estoque
      </a>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
